name: "Flake Lockfile Updater"

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: '0 18 * * 6,3'

jobs:
  nix-flake-update:
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: DeterminateSystems/determinate-nix-action@v3.17.2
      - uses: DeterminateSystems/update-flake-lock@main
        with:
          nix-options: --accept-flake-config
          pr-title: "Update Flake lockfile" # Title of PR to be created
          pr-labels: |                  # Labels to be set on the PR
            dependencies
            automated
